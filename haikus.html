<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Haiku Illustrations - George Gondron">
    <title>Haikus - George Gondron Writings</title>
    <!-- Apply theme BEFORE paint to prevent flash of wrong theme -->
    <link rel="stylesheet" href="css/style.css">
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');</script>
    <style>

        /* ── Haiku gallery ── */
        .haiku-page {
            max-width: 1080px;
            margin: 0 auto;
            padding: 3rem 2rem 6rem;
        }
        .haiku-page-title {
            font-family: var(--serif);
            font-size: clamp(1.6rem, 3vw, 2.2rem);
            font-weight: 400;
            color: var(--ink);
            margin-bottom: .5rem;
        }
        .haiku-page-sub {
            font-family: var(--sans);
            font-size: .8rem;
            color: var(--ink-faint);
            letter-spacing: .06em;
            margin-bottom: 2.5rem;
        }
        .haiku-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        .haiku-item {
            overflow: hidden;
            border-radius: 4px;
            box-shadow: 0 2px 12px rgba(0,0,0,.12);
            cursor: pointer;
            transition: transform .25s, box-shadow .25s;
        }
        .haiku-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 24px rgba(0,0,0,.2);
        }
        .haiku-item img {
            width: 100%;
            display: block;
            object-fit: cover;
        }

        /* ── Lightbox modal ── */
        .haiku-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .haiku-modal.active { display: flex; }
        .haiku-modal img {
            max-width: 90vw;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 2px;
        }
        .modal-close {
            position: fixed;
            top: 1.2rem;
            right: 1.5rem;
            background: none;
            border: none;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            opacity: .8;
            transition: opacity .2s;
            line-height: 1;
        }
        .modal-close:hover { opacity: 1; }
        .modal-nav {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 1rem;
            color: #fff;
            font-family: var(--sans);
            font-size: .8rem;
        }
        .modal-nav button {
            background: rgba(255,255,255,.15);
            border: none;
            color: #fff;
            padding: .45rem 1rem;
            border-radius: 3px;
            cursor: pointer;
            transition: background .2s;
            font-family: var(--sans);
            font-size: .8rem;
        }
        .modal-nav button:hover { background: rgba(255,255,255,.28); }

        @media (max-width: 600px) {
            .haiku-gallery { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; }
        }
    </style>
</head>
<body>

    <!-- Same masthead as main site — inherits all CSS + dark mode automatically -->
    <header class="masthead">
        <div class="masthead-inner">
            <a href="./" class="masthead-name">George Gondron</a>
            <ul class="masthead-nav">
                <li><a href="./#writings">Writings</a></li>
                <li><a href="haikus.html" style="color: var(--gold);">Haikus</a></li>
                <li><a href="./#about">About</a></li>
                <li><a href="./#contact">Contact</a></li>
                <li><button id="theme-btn">☽ Dark</button></li>
            </ul>
        </div>
    </header>

    <main class="haiku-page">
        <h1 class="haiku-page-title">Haiku Illustrations</h1>
        <p class="haiku-page-sub">147 visual haikus by George Gondron &nbsp;·&nbsp; Click any image to view full size</p>
        <div class="haiku-gallery" id="haikuGallery"></div>
    </main>

    <!-- Lightbox -->
    <div class="haiku-modal" id="haikuModal">
        <button class="modal-close" id="modalClose">&times;</button>
        <img id="modalImage" src="" alt="Haiku">
        <div class="modal-nav">
            <button id="prevBtn">← Prev</button>
            <span id="imageCounter"></span>
            <button id="nextBtn">Next →</button>
        </div>
    </div>

    <footer class="footer">
        <p class="footer-name">George Gondron — Writings & Reflections</p>
        <p><a href="mailto:ggondron@hotmail.com">ggondron@hotmail.com</a> &nbsp;·&nbsp; <a href="https://www.facebook.com/gwgondron" target="_blank">Facebook</a> &nbsp;·&nbsp; <a href="https://github.com/blankjw/George-writings">GitHub</a></p>
    </footer>

    <!-- Load shared app.js last — handles theme init + toggle consistently -->
    <script src="js/app.js"></script>

    <script>
        const haikuImages = [
            'image.png','image_1.png','image_2.png','image_3.png','image_4.png',
            'image_5.png','image_6.png','image_7.png','image_8.png','image_9.png',
            'image_10.png','image_11.png','image_12.png','image_13.png','image_14.png',
            'image_15.png','image_16.png','image_17.png','image_18.png','image_19.png',
            'image_20.png','image_21.png','image_22.png','image_23.png','image_24.png',
            'image_25.png','image_26.png','image_27.png','image_28.png','image_29.png',
            'image_30.png','image_31.png','image_32.png','image_33.png','image_34.png',
            'image_35.png','image_36.png','image_37.png','image_38.png','image_39.png',
            'image_40.png','image_41.png','image_42.png','image_43.png','image_44.png',
            'image_45.png','image_46.png','image_47.png','image_48.png','image_49.png',
            'image_50.png','image_51.png','image_52.png','image_53.png','image_54.png',
            'image_55.png','image_56.png','image_57.png','image_58.png','image_59.png',
            'image_60.png','image_61.png','image_62.png','image_63.png','image_64.png',
            'image_65.png','image_66.png','image_67.png','image_68.png','image_69.png',
            'image_70.png','image_71.png','image_72.png','image_73.png','image_74.png',
            'image_75.png','image_76.png','image_77.png','image_78.png','image_79.png',
            'image_80.png','image_81.png','image_82.png','image_83.png','image_84.png',
            'image_85.png','image_86.png','image_87.png','image_88.png','image_89.png',
            'image_90.png','image_91.png','image_92.png','image_93.png','image_94.png',
            'image_95.png','image_96.png','image_97.png','image_98.png','image_99.png',
            'image_100.png','image_101.png','image_102.png','image_103.png','image_104.png',
            'image_105.png','image_106.png','image_107.png','image_108.png','image_109.png',
            'image_110.png','image_111.png','image_112.png','image_113.png','image_114.png',
            'image_115.png','image_116.png','image_117.png','image_118.png','image_119.png',
            'image_120.png','image_121.png','image_122.png','image_123.png','image_124.png',
            'image_125.png','image_126.png','image_127.png','image_128.png','image_129.png',
            'image_130.png','image_131.png','image_132.png','image_133.png','image_134.png',
            'image_135.png','image_136.png','image_137.png','image_138.png','image_139.png',
            'image_140.png','image_141.png','image_142.png','image_143.png','image_144.png',
            'image_145.png','image_146.png'
        ];

        let currentIndex = -1;
        const gallery   = document.getElementById('haikuGallery');
        const modal     = document.getElementById('haikuModal');
        const modalImg  = document.getElementById('modalImage');
        const counter   = document.getElementById('imageCounter');

        // Build gallery
        haikuImages.forEach((img, i) => {
            const item = document.createElement('div');
            item.className = 'haiku-item';
            item.innerHTML = `<img src="haikus-web/${img}" alt="Haiku ${i+1}" loading="lazy">`;
            item.addEventListener('click', () => openModal(i));
            gallery.appendChild(item);
        });

        function openModal(i) {
            currentIndex = i;
            modalImg.src = `haikus-web/${haikuImages[i]}`;
            counter.textContent = `${i+1} / ${haikuImages.length}`;
            modal.classList.add('active');
        }
        function closeModal() { modal.classList.remove('active'); }
        function go(dir) {
            currentIndex = (currentIndex + dir + haikuImages.length) % haikuImages.length;
            modalImg.src = `haikus-web/${haikuImages[currentIndex]}`;
            counter.textContent = `${currentIndex+1} / ${haikuImages.length}`;
        }

        document.getElementById('modalClose').addEventListener('click', closeModal);
        document.getElementById('prevBtn').addEventListener('click', () => go(-1));
        document.getElementById('nextBtn').addEventListener('click', () => go(1));
        modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
        document.addEventListener('keydown', e => {
            if (!modal.classList.contains('active')) return;
            if (e.key === 'ArrowLeft')  go(-1);
            if (e.key === 'ArrowRight') go(1);
            if (e.key === 'Escape')     closeModal();
        });
    </script>
</body>
</html>
